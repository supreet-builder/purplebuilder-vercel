// ─── STATE ───────────────────────────────────────────────────────────────────
const params   = new URLSearchParams(window.location.search);
const siteUrl  = params.get('url') || '';
let filtered   = [...PERSONAS];
let rendered   = 0;
let activeIdx  = null;
let searchTimer = null;
let filterBuying = '', filterSpeed = '', filterAge = '';
const BATCH = 9;

// ─── INIT ─────────────────────────────────────────────────────────────────────
(function init() {
  if (siteUrl) {
    document.getElementById('url-display').textContent = siteUrl;
    document.getElementById('url-chip').href = '/?url=' + encodeURIComponent(siteUrl);
  }
  renderBatch();
  updateResultsLabel();
  window.addEventListener('scroll', onScroll);
  document.addEventListener('click', function(e) {
    const dd = document.getElementById('filter-dd');
    const btn = document.getElementById('filter-btn');
    if (dd.style.display !== 'none' && !dd.contains(e.target) && !btn.contains(e.target)) dd.style.display = 'none';
  });
})();

// ─── RENDER ───────────────────────────────────────────────────────────────────
function renderBatch() {
  const grid = document.getElementById('persona-grid');
  const end = Math.min(rendered + BATCH, filtered.length * 5);
  for (let i = rendered; i < end; i++) {
    const p = filtered[i % filtered.length];
    grid.appendChild(makeCard(p, i));
  }
  rendered = end;
}

function makeCard(p, idx) {
  const d = document.createElement('div');
  d.className = 'card';
  d.dataset.idx = idx;
  d.innerHTML = `
    <div class="card-img"><img src="/humans/${p.img}" alt="${p.name}" loading="lazy"/></div>
    <div class="card-body">
      <div class="card-name">${p.name}</div>
      <div class="card-meta">${p.age} yr old &middot; ${p.location}</div>
      <div class="card-bio">${p.bio}</div>
      <div class="thought-bubble">
        <img class="thought-avatar" src="/humans/${p.img}" alt="" loading="lazy"/>
        <div class="thought-text">&ldquo;${p.thought}&rdquo;</div>
      </div>
      <div class="card-actions">
        <button class="btn-select" onclick="selectPersona(event,${idx})">Select Persona</button>
        <button class="btn-details" onclick="toggleDetails(event,${idx})">Details &nbsp;›</button>
      </div>
    </div>`;
  return d;
}

// ─── DETAILS TOGGLE ───────────────────────────────────────────────────────────
function toggleDetails(e, idx) {
  e.stopPropagation();
  const grid = document.getElementById('persona-grid');
  // Remove existing panels + reset buttons
  grid.querySelectorAll('.detail-panel').forEach(p => p.remove());
  grid.querySelectorAll('.card').forEach(c => {
    c.classList.remove('active');
    const btn = c.querySelector('.btn-details');
    if (btn) btn.innerHTML = 'Details &nbsp;›';
  });

  if (activeIdx === idx) { activeIdx = null; return; }
  activeIdx = idx;

  const allCards = Array.from(grid.querySelectorAll('.card'));
  const card = allCards.find(c => +c.dataset.idx === idx);
  if (!card) return;
  card.classList.add('active');
  card.querySelector('.btn-details').innerHTML = 'Details &nbsp;‹';

  const ci = allCards.indexOf(card);
  const rowEnd = Math.min(Math.floor(ci / 3) * 3 + 2, allCards.length - 1);
  const anchor = allCards[rowEnd];

  const p = filtered[idx % filtered.length];
  const panel = document.createElement('div');
  panel.className = 'detail-panel';
  panel.innerHTML = `
    <div class="detail-left">
      <div class="detail-left-img"><img src="/humans/${p.img}" alt="${p.name}"/></div>
      <div class="detail-left-body">
        <div class="card-name">${p.name}</div>
        <div class="card-meta">${p.age} yr old &middot; ${p.location}</div>
        <div class="card-bio" style="margin-top:6px">${p.bio}</div>
        <div class="detail-spacer"></div>
        <div class="thought-bubble">
          <img class="thought-avatar" src="/humans/${p.img}" alt=""/>
          <div class="thought-text">&ldquo;${p.thought}&rdquo;</div>
        </div>
        <div class="card-actions" style="margin-top:10px">
          <button class="btn-select" onclick="selectPersona(event,${idx})">Select Persona</button>
          <button class="btn-details" onclick="toggleDetails(event,${idx})">Details &nbsp;‹</button>
        </div>
      </div>
    </div>
    <div class="detail-right">
      <div class="detail-heading">Details</div>
      <div class="detail-fields">
        ${p.details.map(([l,v])=>`<div><div class="df-label">${l}</div><div class="df-value">${v}</div></div>`).join('')}
      </div>
    </div>`;

  anchor.insertAdjacentElement('afterend', panel);
  setTimeout(() => panel.scrollIntoView({ behavior:'smooth', block:'nearest' }), 50);
}

// ─── SELECT PERSONA ───────────────────────────────────────────────────────────
function selectPersona(e, idx) {
  e.stopPropagation();
  window.location.href = '/app' + (siteUrl ? '?url=' + encodeURIComponent(siteUrl) : '');
}

// ─── SEARCH ───────────────────────────────────────────────────────────────────
function debounceSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(runSearch, 240);
}

function runSearch() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  rebuildFiltered(q);
  resetGrid();
}

function rebuildFiltered(q) {
  let base = PERSONAS.filter(p => {
    if (filterBuying && !p.details.some(([l,v])=>l==='Buying Power'&&v.toLowerCase().includes(filterBuying.toLowerCase()))) return false;
    if (filterSpeed && !p.details.some(([l,v])=>l==='Decision Speed'&&v.toLowerCase().includes(filterSpeed.toLowerCase()))) return false;
    if (filterAge) {
      const ageRange = p.details.find(([l])=>l==='Age Range');
      if (!ageRange || !matchAge(p.age, filterAge)) return false;
    }
    return true;
  });
  filtered = q ? base.filter(p => [p.name,p.role,p.location,p.bio,...p.details.map(d=>d[1])].join(' ').toLowerCase().includes(q)) : base;
}

function matchAge(age, range) {
  if (range==='18-25') return age>=18&&age<=25;
  if (range==='26-35') return age>=26&&age<=35;
  if (range==='36-50') return age>=36&&age<=50;
  if (range==='50+') return age>50;
  return true;
}

function resetGrid() {
  const grid = document.getElementById('persona-grid');
  grid.innerHTML = '';
  rendered = 0;
  activeIdx = null;
  if (!filtered.length) { grid.innerHTML = '<div class="empty-state">No personas match your search. Try different keywords.</div>'; }
  else renderBatch();
  updateResultsLabel();
}

// ─── FILTER ───────────────────────────────────────────────────────────────────
function toggleFilter() {
  const dd = document.getElementById('filter-dd');
  dd.style.display = dd.style.display === 'none' ? 'block' : 'none';
}

['fg-buying','fg-speed','fg-age'].forEach(gid => {
  document.getElementById(gid).addEventListener('click', function(e) {
    const btn = e.target.closest('.fchip');
    if (!btn) return;
    this.querySelectorAll('.fchip').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

function applyFilters() {
  filterBuying = document.querySelector('#fg-buying .fchip.active')?.dataset.v || '';
  filterSpeed  = document.querySelector('#fg-speed .fchip.active')?.dataset.v || '';
  filterAge    = document.querySelector('#fg-age .fchip.active')?.dataset.v || '';
  document.getElementById('filter-dd').style.display = 'none';
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  rebuildFiltered(q);
  resetGrid();
}

function resetFilters() {
  filterBuying = filterSpeed = filterAge = '';
  ['fg-buying','fg-speed','fg-age'].forEach(gid => {
    const chips = document.querySelectorAll(`#${gid} .fchip`);
    chips.forEach(c => c.classList.remove('active'));
    chips[0]?.classList.add('active');
  });
  applyFilters();
}

// ─── INFINITE SCROLL ──────────────────────────────────────────────────────────
function onScroll() {
  if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 400) {
    renderBatch();
  }
}

// ─── UI HELPERS ───────────────────────────────────────────────────────────────
function updateResultsLabel() {
  document.getElementById('results-label').textContent =
    filtered.length ? `Showing ${filtered.length} personas · Scroll for more` : '';
}
</script>
